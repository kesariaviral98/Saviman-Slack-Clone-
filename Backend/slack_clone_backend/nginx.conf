events {
    worker_connections 1024;
}

http {
    upstream backend {
        server localhost:4000;
    }

    # ── Redirect all HTTP → HTTPS ─────────────────────────────────────────────
    server {
        listen 80;
        server_name savimanapi.serveminecraft.net;
        return 301 https://$host$request_uri;
    }

    # ── HTTPS server ──────────────────────────────────────────────────────────
    server {
        listen 443 ssl;
        server_name savimanapi.serveminecraft.net;

        ssl_certificate     /etc/letsencrypt/live/savimanapi.serveminecraft.net/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/savimanapi.serveminecraft.net/privkey.pem;
        include             /etc/letsencrypt/options-ssl-nginx.conf;
        ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

        # Increase timeouts for long-lived WebSocket connections
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;

        # ── Socket.io WebSocket upgrade ──────────────────────────────────────
        location /socket.io/ {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
        }

        # ── All REST API requests ─────────────────────────────────────────────
        location / {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
